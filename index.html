<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MLB Pool Standings</title>
</head>
<body>
  <h1>MLB Pool Standings</h1>
  <p id="updated">Loading...</p>
  <div id="standings"></div>

  <script>
    fetch("standings.json")
      .then(res => res.json())
      .then(data => {
        document.getElementById("updated").innerText =
          "Last updated: " + data.last_updated;

        const container = document.getElementById("standings");

        data.standings.forEach(entry => {
          const div = document.createElement("div");

          div.innerHTML = `
            <h2>${entry.rank}. ${entry.person} - ${entry.total_wins} wins</h2>
            <ul>
              ${entry.teams.map(t => `<li>${t.team}: ${t.wins}</li>`).join("")}
            </ul>
          `;

          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
