<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB Pool Standings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f7f7f7;
      color: #111;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    #updated {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    li {
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <h1>MLB Pool Standings</h1>
  <p id="updated">Loading...</p>
  <div id="standings"></div>

  <script>
    fetch("standings.json")
      .then(res => res.json())
      .then(data => {
        document.getElementById("updated").innerText =
          "Last updated: " + data.last_updated;

        const container = document.getElementById("standings");
        container.innerHTML = "";

        data.standings.forEach(entry => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <h2>${entry.rank}. ${entry.person} — ${entry.win_pct} (${entry.total_wins}-${entry.total_losses})</h2>
            <ul>
              ${entry.teams.map(t => `<li>${t.team}: ${t.wins}-${t.losses}</li>`).join("")}
            </ul>
          `;

          container.appendChild(div);
        });
      })
      .catch(error => {
        document.getElementById("updated").innerText = "Error loading standings.";
        console.error(error);
      });
  </script>
</body>
</html>
